name: Build and Release

on:
  push:
    tags:
      - "v*" # Trigger on tags

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Go environment
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23.3"

      # Build frontend
      - name: Build frontend
        run: |
          cd front
          yarn
          yarn build

      # Build backend binaries
      - name: Build backend binaries
        run: VERSION=${{ github.ref_name }} back/build.sh

      # Create GitHub Release and upload assets
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          name: "${{ github.ref_name }}"
          artifacts: |
            back/anemone-${{ github.ref_name }}-darwin-amd64.zip
            back/anemone-${{ github.ref_name }}-darwin-arm64.zip
            back/anemone-${{ github.ref_name }}-linux-amd64.zip
            back/anemone-${{ github.ref_name }}-linux-arm64.zip
